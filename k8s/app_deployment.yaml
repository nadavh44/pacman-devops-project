apiVersion: apps/v1
kind: Deployment
metadata:
  name: pacman-deployment
  labels:
    app: pacman
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pacman
  template:
    metadata:
      labels:
        app: pacman
    spec:
      containers:
        - name: pacman
          image: 380648615517.dkr.ecr.us-west-2.amazonaws.com/pacman:IMAGE_TAG_PLACEHOLDER
          imagePullPolicy: IfNotPresent
          env:
            - name: MONGO_SERVICE_HOST
              value: "mongo"
            - name: MONGO_DATABASE
              value: "pacman"
            - name: MY_MONGO_PORT
              value: "27017"
            - name: MONGO_USE_SSL
              value: "false"
            - name: MONGO_VALIDATE_SSL
              value: "false"
            - name: MONGO_URL
              value: "mongodb://mongo:27017/pacman"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: pacman-service
  labels:
    app: pacman
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer
  selector:
    app: pacman
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
